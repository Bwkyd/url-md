name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1 \
            || gh release create "$TAG" --repo "${{ github.repository }}" --title "$TAG" --generate-notes

  upload-assets:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
          # Intel Mac 交叉编译: 用 Apple Silicon runner(macos-14)做 cross,避开慢速 macos-13 队列.
          # rustup 自动装 x86_64-apple-darwin target, cargo 直接能 cross-compile.
          - target: x86_64-apple-darwin
            os: macos-14
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: url-md
          target: ${{ matrix.target }}
          archive: $bin-$target
          tar: unix
          zip: windows
          token: ${{ secrets.GITHUB_TOKEN }}
